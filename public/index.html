<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CZP Agenda">
<meta name="theme-color" content="#1a6bcc">
<link rel="manifest" href="/manifest.json">
<title>CZP Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-left">
    <span class="logo">CZP<em>&Co.</em></span>
    <span class="logo-sub">Agenda</span>
  </div>
  <div class="header-right">
    <button class="btn-icon" id="btn-outlook" title="Connetti Outlook">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
      <span id="outlook-label">Outlook</span>
    </button>
    <div class="outlook-dot" id="outlook-dot"></div>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout" id="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-section">
      <div class="sb-label">Clienti</div>
      <div id="client-list" class="client-list"></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Calendario</div>
      <div class="mini-cal">
        <div class="cal-nav">
          <button class="cal-nav-btn" id="cal-prev">‹</button>
          <span id="cal-lbl" class="cal-lbl"></span>
          <button class="cal-nav-btn" id="cal-next">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>
  </aside>

  <!-- AGENDA -->
  <main class="agenda-panel">
    <div class="toolbar">
      <div class="filters">
        <button class="pill active" data-f="all">Tutti</button>
        <button class="pill" data-f="pending">Da fare</button>
        <button class="pill" data-f="done">Completati</button>
        <button class="pill" data-f="alta">Alta priorità</button>
      </div>
      <button class="btn-icon mobile-only" id="btn-sidebar-toggle">☰</button>
    </div>
    <div class="agenda-scroll" id="agenda-scroll">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">✦</div>
        <p>Nessun task ancora.</p>
        <p class="empty-sub">Usa il chatbot per aggiungerne!</p>
      </div>
    </div>
  </main>

  <!-- CHAT -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <div class="chat-avatar">AI</div>
      <div class="chat-header-text">
        <div class="chat-title">Assistente</div>
        <div class="chat-subtitle" id="chat-sub">pronto</div>
      </div>
      <button class="btn-icon mobile-only" id="btn-chat-close">✕</button>
    </div>
    <div class="chat-messages" id="chat-msgs">
      <div class="msg ai">
        <div class="msg-content">
          Ciao Fede! Dimmi cosa aggiungere in agenda — uso linguaggio naturale.<br><br>
          <em>Es: "call Fastweb giovedì priorità alta" oppure "brief Cisco entro venerdì, meeting"</em>
        </div>
      </div>
    </div>
    <div class="chat-footer">
      <div class="chat-input-row">
        <textarea id="chat-ta" class="chat-ta" placeholder="Aggiungi task o chiedi qualcosa…" rows="1"></textarea>
        <button class="send-btn" id="send-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="hints" id="hints">
        <button class="hint" data-h="Aggiungi ">+ aggiungi</button>
        <button class="hint" data-h="Sposta ">sposta</button>
        <button class="hint" data-h="Completa ">completa</button>
        <button class="hint" data-h="Elimina ">elimina</button>
        <button class="hint" data-h="Mostra task di ">filtra</button>
      </div>
    </div>
  </div>

</div>

<!-- MOBILE CHAT FAB -->
<button class="fab" id="fab">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</button>

<script src="/js/app.js" type="module"></script>
</body>
</html>
